version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: cfd-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cfd_platform

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cfd-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=cfd_platform
    depends_on:
      - mongodb
    networks:
      - cfd-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cfd-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cfd-network

volumes:
  mongodb_data:

networks:
  cfd-network:
    driver: bridge
