<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息网关监控面板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .stat-card .label {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
        }

        .stat-card.success .value { color: #10b981; }
        .stat-card.warning .value { color: #f59e0b; }
        .stat-card.danger .value { color: #ef4444; }
        .stat-card.info .value { color: #3b82f6; }

        .stat-card .trend {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .trend.up { color: #10b981; }
        .trend.down { color: #ef4444; }

        .charts-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .chart-card h3 {
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: #e0e7ff;
            color: #4f46e5;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #c7d2fe;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .channel-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .channel-card .channel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .channel-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
        }

        .channel-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge-email { background: #dbeafe; color: #1d4ed8; }
        .badge-sms { background: #dcfce7; color: #15803d; }
        .badge-push { background: #fef3c7; color: #b45309; }

        .provider-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .provider-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .provider-name {
            font-weight: 500;
            color: #334155;
        }

        .provider-stats {
            text-align: right;
            font-size: 0.85rem;
            color: #64748b;
        }

        .success-rate {
            font-weight: 600;
            color: #10b981;
        }

        .hourly-chart {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #f1f5f9;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #4f46e5;
            color: white;
        }

        @media (max-width: 1024px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📨 消息网关监控面板</h1>
            <div class="status-indicator">
                <span class="pulse"></span>
                <span id="systemStatus">系统运行中</span>
                <span id="lastUpdate">最后更新: --</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card info">
                <div class="label">总发送量 (近7天)</div>
                <div class="value" id="totalCount">--</div>
            </div>
            <div class="stat-card success">
                <div class="label">成功率</div>
                <div class="value" id="successRate">--%</div>
            </div>
            <div class="stat-card warning">
                <div class="label">平均延迟</div>
                <div class="value" id="avgLatency">-- ms</div>
            </div>
            <div class="stat-card danger">
                <div class="label">失败数量</div>
                <div class="value" id="failedCount">--</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">实时处理量 (近5分钟)</div>
                <div class="value" id="realtimeTotal">--</div>
            </div>
            <div class="stat-card success">
                <div class="label">实时成功率</div>
                <div class="value" id="realtimeSuccessRate">--%</div>
            </div>
            <div class="stat-card info">
                <div class="label">实时平均延迟</div>
                <div class="value" id="realtimeLatency">-- ms</div>
            </div>
            <div class="stat-card">
                <div class="label">实时失败数</div>
                <div class="value" id="realtimeFailed">--</div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-card">
                <h3>
                    <span>📈 每日发送趋势</span>
                    <button class="refresh-btn" onclick="refreshData()">🔄 刷新</button>
                </h3>
                <div class="chart-wrapper">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>📊 各渠道占比</h3>
                <div class="chart-wrapper">
                    <canvas id="channelPieChart"></canvas>
                </div>
            </div>
        </div>

        <div class="hourly-chart">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('24h', this)">24小时趋势</button>
                <button class="tab-btn" onclick="switchTab('email', this)">EMAIL</button>
                <button class="tab-btn" onclick="switchTab('sms', this)">SMS</button>
                <button class="tab-btn" onclick="switchTab('push', this)">PUSH</button>
            </div>
            <div class="chart-wrapper" style="height: 250px;">
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <div class="channels-grid" style="margin-top: 30px;">
            <div class="channel-card" id="emailChannel">
                <div class="channel-header">
                    <span class="channel-name">📧 EMAIL 渠道</span>
                    <span class="channel-badge badge-email">EMAIL</span>
                </div>
                <div class="provider-list" id="emailProviders">
                </div>
            </div>
            <div class="channel-card" id="smsChannel">
                <div class="channel-header">
                    <span class="channel-name">📱 SMS 渠道</span>
                    <span class="channel-badge badge-sms">SMS</span>
                </div>
                <div class="provider-list" id="smsProviders">
                </div>
            </div>
            <div class="channel-card" id="pushChannel">
                <div class="channel-header">
                    <span class="channel-name">🔔 PUSH 渠道</span>
                    <span class="channel-badge badge-push">PUSH</span>
                </div>
                <div class="provider-list" id="pushProviders">
                </div>
            </div>
        </div>
    </div>

    <script>
        let dailyChart, channelPieChart, hourlyChart;
        let currentTab = '24h';

        async function fetchMetrics() {
            try {
                const [summaryRes, realtimeRes] = await Promise.all([
                    fetch('/api/v1/metrics/summary?days=7'),
                    fetch('/api/v1/metrics/realtime')
                ]);

                const summary = await summaryRes.json();
                const realtime = await realtimeRes.json();

                updateStats(summary, realtime);
                updateDailyChart(summary.dailyTrend);
                updateChannelPieChart(summary.byChannel);
                updateHourlyChart(summary.hourlyTrend);
                updateProviderPerformance();

                document.getElementById('lastUpdate').textContent = 
                    '最后更新: ' + new Date().toLocaleTimeString('zh-CN');
            } catch (error) {
                console.error('获取监控数据失败:', error);
            }
        }

        function updateStats(summary, realtime) {
            document.getElementById('totalCount').textContent = formatNumber(summary.totalCount || 0);
            document.getElementById('successRate').textContent = (summary.successRate || 0) + '%';
            document.getElementById('avgLatency').textContent = (summary.avgLatencyMs || 0) + ' ms';
            document.getElementById('failedCount').textContent = formatNumber(summary.failedCount || 0);

            document.getElementById('realtimeTotal').textContent = formatNumber(realtime.totalCount || 0);
            document.getElementById('realtimeSuccessRate').textContent = (realtime.successRate || 0) + '%';
            document.getElementById('realtimeLatency').textContent = (realtime.avgLatencyMs || 0) + ' ms';
            document.getElementById('realtimeFailed').textContent = formatNumber(realtime.failedCount || 0);
        }

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function updateDailyChart(dailyTrend) {
            const labels = dailyTrend.map(d => d.date);
            const successData = dailyTrend.map(d => d.successCount);
            const failedData = dailyTrend.map(d => d.failedCount);

            if (dailyChart) {
                dailyChart.destroy();
            }

            const ctx = document.getElementById('dailyChart').getContext('2d');
            dailyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '成功',
                            data: successData,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '失败',
                            data: failedData,
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function updateChannelPieChart(byChannel) {
            const labels = Object.keys(byChannel);
            const data = labels.map(key => byChannel[key].totalCount);
            const colors = ['#3b82f6', '#10b981', '#f59e0b'];

            if (channelPieChart) {
                channelPieChart.destroy();
            }

            const ctx = document.getElementById('channelPieChart').getContext('2d');
            channelPieChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors.slice(0, labels.length)
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function updateHourlyChart(hourlyTrend) {
            const labels = hourlyTrend.map(h => h.hour + ':00');
            const data = hourlyTrend.map(h => h.totalCount);

            if (hourlyChart) {
                hourlyChart.destroy();
            }

            const ctx = document.getElementById('hourlyChart').getContext('2d');
            hourlyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '发送量',
                        data: data,
                        backgroundColor: 'rgba(79, 70, 229, 0.7)',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        async function updateProviderPerformance() {
            const channels = ['EMAIL', 'SMS', 'PUSH'];
            
            for (const channel of channels) {
                try {
                    const res = await fetch(`/api/v1/metrics/channel/${channel}`);
                    const providers = await res.json();
                    
                    const containerId = channel.toLowerCase() + 'Providers';
                    const container = document.getElementById(containerId);
                    
                    if (providers.length === 0) {
                        container.innerHTML = '<div style="color: #94a3b8; text-align: center; padding: 20px;">暂无数据</div>';
                        continue;
                    }

                    container.innerHTML = providers.map(p => `
                        <div class="provider-item">
                            <div class="provider-name">${p.provider}</div>
                            <div class="provider-stats">
                                <div>发送: ${formatNumber(p.totalCount)} | 成功: ${formatNumber(p.successCount)}</div>
                                <div class="success-rate">成功率: ${p.successRate}% | 延迟: ${p.avgLatencyMs}ms</div>
                            </div>
                        </div>
                    `).join('');
                } catch (error) {
                    console.error(`获取 ${channel} 渠道数据失败:`, error);
                }
            }
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function refreshData() {
            fetchMetrics();
        }

        fetchMetrics();
        setInterval(fetchMetrics, 30000);
    </script>
</body>
</html>
